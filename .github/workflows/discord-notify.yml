# Send Discord notification on modpack update
name: Discord Notification

on:
  push:
    branches: [main]
    paths:
      - 'mods/**'
      - 'tacz/**'
      - 'config/**'
      - 'options.txt'
      - 'pack.toml'
      - 'index.toml'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          
      - name: Get changed mods
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- mods/ | sed 's/mods\///' | sed 's/\.pw\.toml//' | tr '\n' ', ' | sed 's/,$//')
          echo "mods=$CHANGED" >> $GITHUB_OUTPUT
          
      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          CHANGED_MODS: ${{ steps.changes.outputs.mods }}
        run: |
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Discord webhook not configured, skipping notification"
            exit 0
          fi
          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🎮 Modpack Updated / Modpack が更新されました！\",
                \"description\": \"Will auto-update on next launch. / 次回起動時に自動更新されます。\",
                \"color\": 5763719,
                \"fields\": [
                  {
                    \"name\": \"📦 Changed Mods / 変更された Mod\",
                    \"value\": \"$CHANGED_MODS\"
                  },
                  {
                    \"name\": \"📝 Commit / コミット\",
                    \"value\": \"[\`${GITHUB_SHA:0:7}\`]($GITHUB_SERVER_URL/$GITHUB_REPOSITORY/commit/$GITHUB_SHA)\"
                  }
                ],
                \"footer\": {
                  \"text\": \"Minecraft 1.20.1 Modpack\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }" \
            "$DISCORD_WEBHOOK"
